<!DOCTYPE html>
<html>

<head>
    <title>Muscle Imbalance Detection</title>

    <style>

        body {
            font-family: Arial;
            background: #f5f5f5;
            text-align: center;
        }

        .container {
            background: white;
            padding: 30px;
            margin-top: 80px;
            width: 400px;
            margin-left: auto;
            margin-right: auto;
            border-radius: 10px;
        }

        input {
            padding: 10px;
            margin: 10px;
            width: 80%;
        }

        button {
            padding: 10px 20px;
            background: green;
            color: white;
            border: none;
        }

    </style>

</head>

<body>

<div class="container">

<h2>Smart Muscle Imbalance Detection</h2>

<form action="/predict" method="post">

<input type="number"
name="left"
step="0.01"
placeholder="Left Load (kg)"
required>

<br>

<input type="number"
name="right"
step="0.01"
placeholder="Right Load (kg)"
required>

<br>

<input type="number"
name="total"
step="0.01"
placeholder="Total Load (kg)"
required>

<br>

<button type="submit">
Predict Muscle
</button>

</form>

</div>

</body>

</html>
